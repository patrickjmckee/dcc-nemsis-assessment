env: dev

db:
  server: localhost
  database: dcc_nemsis
  driver: "ODBC Driver 18 for SQL Server"
  auth: trusted        # trusted (Windows/integrated) | sql
  username: ""         # used only when auth = sql
  password: ""         # used only when auth = sql

paths:
  source_dir: ./_Claude/INPUTS
  source_pattern: "ems_runs_{year}.csv"
  years: [2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025]

reference:
  counties_file: ./config/indiana_counties.txt

etl:
  batch_size: 50000
  read_chunk_size: 200000  # rows per CSV read chunk (caps peak memory)
  load_mode: full        # full | incremental
  load_window_years: []  # empty = all years; list years for incremental

logging:
  log_dir: ./logs
  log_level: INFO